<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KURÜCHE</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; }
canvas { display:block; }
#controls {
  position:fixed; bottom:1.5rem; right:1.5rem;
  display:flex; gap:8px; transition:opacity 0.4s;
}
#controls.hidden { opacity:0; pointer-events:none; }
.btn {
  background:transparent; border:0.5px solid rgba(255,255,255,0.25);
  color:rgba(255,255,255,0.4); font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  font-size:10px; letter-spacing:0.12em; padding:7px 14px; cursor:pointer;
}
.btn:hover { color:#fff; border-color:#fff; }
#hint {
  position:fixed; bottom:1.5rem; left:1.5rem;
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  font-size:9px; letter-spacing:0.15em; color:rgba(255,255,255,0.12);
  transition:opacity 0.4s;
}
#hint.hidden { opacity:0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="controls">
  <button class="btn" id="btn-speed">ritmo: lento</button>
  <button class="btn" id="btn-mode">modo: umbral</button>
</div>
<div id="hint">F — ocultar &nbsp;|&nbsp; WIN+G — grabar</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

const IMG_URL = 'https://raw.githubusercontent.com/Gabrielovi/kuriche/main/logo%20sin%20texto%20bajada.png';

const img = new Image();
img.crossOrigin = 'anonymous';
img.src = IMG_URL;

let speedIdx = 0;
const speeds = [0.008, 0.02, 0.05];
const speedLabels = ['ritmo: lento','ritmo: medio','ritmo: rápido'];
let modeIdx = 0;
const modeLabels = ['modo: umbral','modo: ruido','modo: ambos'];

let t = 0;

img.onload = () => { loop(); };
img.onerror = () => {
  // fallback: try underscored name
  img.src = 'https://raw.githubusercontent.com/Gabrielovi/kuriche/main/logo_sin_texto_bajada.png';
};

function loop() {
  requestAnimationFrame(loop);
  t += speeds[speedIdx];

  const W = canvas.width, H = canvas.height;
  const iW = img.naturalWidth, iH = img.naturalHeight;
  const scale = Math.min(W / iW, H / iH) * 0.9;
  const dW = iW * scale, dH = iH * scale;
  const x = (W - dW) / 2, y = (H - dH) / 2;

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // --- capa base ---
  ctx.globalAlpha = 0.85;
  ctx.globalCompositeOperation = 'source-over';
  ctx.drawImage(img, x, y, dW, dH);

  // --- pulso de brillo: dibujamos la imagen más brillante encima con screen ---
  if (modeIdx === 0 || modeIdx === 2) {
    const pulse = (Math.sin(t * 1.3) * 0.5 + 0.5) * 0.45; // 0 a 0.45
    ctx.globalAlpha = pulse;
    ctx.globalCompositeOperation = 'screen';
    ctx.drawImage(img, x, y, dW, dH);

    // segundo pulso más lento, offset de fase
    const pulse2 = (Math.sin(t * 0.6 + 1.8) * 0.5 + 0.5) * 0.3;
    ctx.globalAlpha = pulse2;
    ctx.globalCompositeOperation = 'overlay';
    ctx.drawImage(img, x, y, dW, dH);
  }

  // --- vaivén de erosión: imagen desplazada levemente, se funde ---
  if (modeIdx === 1 || modeIdx === 2) {
    const drift = Math.sin(t * 0.7) * 2.5;
    const drift2 = Math.cos(t * 0.5) * 1.5;
    const erosion = (Math.sin(t * 0.9 + 0.5) * 0.5 + 0.5) * 0.25;
    ctx.globalAlpha = erosion;
    ctx.globalCompositeOperation = 'difference';
    ctx.drawImage(img, x + drift, y + drift2, dW, dH);
  }

  // --- destellos ocasionales ---
  const flash = Math.max(0, Math.sin(t * 2.1) * Math.sin(t * 3.7));
  if (flash > 0.7) {
    ctx.globalAlpha = (flash - 0.7) * 0.4;
    ctx.globalCompositeOperation = 'screen';
    ctx.drawImage(img, x - 1, y, dW, dH);
  }

  // reset
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
}

document.getElementById('btn-speed').addEventListener('click', () => {
  speedIdx = (speedIdx + 1) % 3;
  document.getElementById('btn-speed').textContent = speedLabels[speedIdx];
});
document.getElementById('btn-mode').addEventListener('click', () => {
  modeIdx = (modeIdx + 1) % 3;
  document.getElementById('btn-mode').textContent = modeLabels[modeIdx];
});
document.addEventListener('keydown', e => {
  if (e.key === 'f' || e.key === 'F') {
    document.getElementById('controls').classList.toggle('hidden');
    document.getElementById('hint').classList.toggle('hidden');
  }
});
</script>
</body>
</html>
